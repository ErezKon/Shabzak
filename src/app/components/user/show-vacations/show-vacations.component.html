<div class="show-vacations">
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8 zebra">
        <!-- From Column -->
        <ng-container matColumnDef="from">
            <th mat-header-cell *matHeaderCellDef> מתאריך </th>
            <td mat-cell *matCellDef="let vacation"> {{formatDate(vacation.from)}} </td>
        </ng-container>

        <!-- To Column -->
        <ng-container matColumnDef="to">
            <th mat-header-cell *matHeaderCellDef> עד תאריך </th>
            <td mat-cell *matCellDef="let vacation"> {{formatDate(vacation.to)}} </td>
        </ng-container>

        <!-- Status Column -->
        <ng-container matColumnDef="approved">
            <th mat-header-cell *matHeaderCellDef> סטטוס </th>
            <td mat-cell *matCellDef="let vacation"> {{translateStatus(vacation.approved)}} </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

        <!-- Row shown when there is no matching data. -->
        <tr class="mat-row" *matNoDataRow>
            <td class="mat-cell" colspan="3">אין בקשות יציאה</td>
        </tr>
    </table>
</div>
